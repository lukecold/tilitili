name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: tilitili-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: tilitili-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: tilitili-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: tilitili-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: tilitili-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release binaries
        run: |
          mkdir release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          cd release && ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          body: |
            ## Install

            Download the binary for your platform, make it executable, and move it to your PATH:

            **macOS (Apple Silicon):**
            ```bash
            curl -L -o tilitili https://github.com/lukecold/tilitili/releases/download/${{ github.ref_name }}/tilitili-darwin-arm64
            chmod +x tilitili
            sudo mv tilitili /usr/local/bin/
            ```

            **macOS (Intel):**
            ```bash
            curl -L -o tilitili https://github.com/lukecold/tilitili/releases/download/${{ github.ref_name }}/tilitili-darwin-amd64
            chmod +x tilitili
            sudo mv tilitili /usr/local/bin/
            ```

            **Linux (x86_64):**
            ```bash
            curl -L -o tilitili https://github.com/lukecold/tilitili/releases/download/${{ github.ref_name }}/tilitili-linux-amd64
            chmod +x tilitili
            sudo mv tilitili /usr/local/bin/
            ```

            **Windows:**
            Download `tilitili-windows-amd64.exe` and add it to your PATH.

            ### Prerequisites
            - [mpv](https://mpv.io/) — required for video playback
            - [yt-dlp](https://github.com/yt-dlp/yt-dlp) — required for YouTube, used by mpv for Bilibili
